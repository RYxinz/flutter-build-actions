name: ZIP2APK Build
on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID dari bot'
        required: true
      zip_url:
        description: 'URL download file ZIP Flutter'
        required: true
      app_name:
        description: 'Nama Aplikasi (override)'
        required: false
        default: ''
      package_name:
        description: 'Package name (override)'
        required: false
        default: ''

jobs:
  build:
    name: "ZIP→APK | ${{ github.event.inputs.app_name || 'Flutter App' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Download ZIP
        run: |
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}" \
            --max-time 120 --retry 3 -H "User-Agent: FlutterBuildBot/2.0"

      - name: Extract ZIP
        run: |
          mkdir -p flutter_project
          unzip -q project.zip -d flutter_project
          ITEMS=$(ls flutter_project | wc -l)
          if [ "$ITEMS" -eq 1 ] && [ -d "flutter_project/$(ls flutter_project)" ]; then
            INNER=$(ls flutter_project)
            mv flutter_project/$INNER/* flutter_project/ 2>/dev/null || true
            rm -rf flutter_project/$INNER
          fi
          [ -f "flutter_project/pubspec.yaml" ] || (echo "ERROR: pubspec.yaml tidak ditemukan" && exit 1)

      - name: Override app config
        run: |
          cd flutter_project
          if [ -n "${{ github.event.inputs.app_name }}" ]; then
            find android -name "AndroidManifest.xml" -exec \
              sed -i 's/android:label="[^"]*"/android:label="${{ github.event.inputs.app_name }}"/' {} \;
          fi
          if [ -n "${{ github.event.inputs.package_name }}" ]; then
            sed -i 's/applicationId ".*"/applicationId "${{ github.event.inputs.package_name }}"/' \
              android/app/build.gradle
          fi

      - name: Get dependencies
        run: cd flutter_project && flutter pub get

      - name: Build APK
        run: cd flutter_project && flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.event.inputs.build_id }}
          path: flutter_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
