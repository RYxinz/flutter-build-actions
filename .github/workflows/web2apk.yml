name: Web2APK Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID dari bot'
        required: true
      website_url:
        description: 'URL website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
        default: 'My App'
      package_name:
        description: 'Package name'
        required: true
        default: 'com.example.app'

jobs:
  build:
    name: "Web→APK | ${{ github.event.inputs.app_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Create WebView project
        run: |
          flutter create --org ${{ github.event.inputs.package_name }} \
            --project-name app --platforms android web2apk_project

      - name: Override package name
        run: |
          cd web2apk_project
          sed -i 's/applicationId ".*"/applicationId "${{ github.event.inputs.package_name }}"/' \
            android/app/build.gradle

      - name: Inject WebView code
        run: |
          cd web2apk_project
          flutter pub add webview_flutter
          cat > lib/main.dart << 'DART'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
            runApp(const MyApp());
          }
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
              title: '${{ github.event.inputs.app_name }}',
              debugShowCheckedModeBanner: false,
              theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.deepPurple), useMaterial3: true),
              home: const WebViewPage(),
            );
          }
          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override State<WebViewPage> createState() => _WebViewPageState();
          }
          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController _c;
            bool _loading = true;
            @override
            void initState() {
              super.initState();
              _c = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(NavigationDelegate(
                  onPageStarted: (_) => setState(() => _loading = true),
                  onPageFinished: (_) => setState(() => _loading = false),
                ))
                ..loadRequest(Uri.parse('${{ github.event.inputs.website_url }}'));
            }
            @override
            Widget build(BuildContext context) => PopScope(
              canPop: false,
              onPopInvoked: (d) async { if (await _c.canGoBack()) _c.goBack(); },
              child: Scaffold(body: Stack(children: [
                WebViewWidget(controller: _c),
                if (_loading) const Center(child: CircularProgressIndicator()),
              ])),
            );
          }
          DART

      - name: Get dependencies
        run: cd web2apk_project && flutter pub get

      - name: Build APK
        run: cd web2apk_project && flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.event.inputs.build_id }}
          path: web2apk_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
